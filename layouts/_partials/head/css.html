<link rel="stylesheet" href="https://use.typekit.net/yys7vri.css">

{{ $scss := resources.Get "scss/site.scss" }}
{{ $styles := $scss | toCSS | minify | fingerprint }}
<link rel="stylesheet" href="{{ $styles.RelPermalink }}" integrity="{{ $styles.Data.Integrity }}">

{{- if .Site.Params.pagefind_enabled }}
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
{{- end }}

{{ with site.Data.settings.settings.extras.custom_css }}
<style>
{{ . | safeCSS }}
</style>
{{ end }}

{{ if not hugo.IsProduction }}
  <link rel="stylesheet" href="https://kit.fontawesome.com/e18572e018.css" crossorigin="anonymous">
{{ end }}
